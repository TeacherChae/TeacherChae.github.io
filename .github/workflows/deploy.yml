name: Deploy to GitHub Pages
run-name: "Deploy ${{ github.ref_name }}${{ inputs.note && format(' — {0}', inputs.note) || '' }}"

# 자동 배포 OFF. 항상 Actions 탭에서 "Run workflow" 로 브랜치를 골라 수동 실행.
# (이전의 push 트리거는 의도적으로 제거함.)
on:
  workflow_dispatch:
    inputs:
      note:
        description: '메모 (예: layout/ticket 시안 검토). 비워둬도 됨.'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
